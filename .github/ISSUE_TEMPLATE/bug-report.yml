name: 不具合を報告
description: 億万印刷所で発生した問題を開発者へ知らせます。
title: "[不具合] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        ご報告ありがとうございます。個人情報、セーブデータ、機密情報は書かないでください。
  - type: input
    id: app-version
    attributes:
      label: アプリバージョン
      description: アプリの「設定」画面に表示されています。
      placeholder: 例 1.0.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: OS
      options:
        - iOS
        - Android
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: 端末とOSバージョン
      placeholder: 例 iPhone 15 / iOS 19.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 問題が起こるまでの操作を順番に書いてください。
      placeholder: |
        1. 工場タブを開く
        2. 製造ボタンを押す
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待した結果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の結果
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 確認
      options:
        - label: 個人情報や機密情報を含めていません。
          required: true
